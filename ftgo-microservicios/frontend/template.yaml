AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FTGO Frontend — HTML servido por Lambda + API Gateway.

Globals:
  Function:
    Timeout: 10
    Runtime: python3.13
    MemorySize: 128

Resources:
  FrontendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ftgo-frontend
      Handler: handler.lambda_handler
      CodeUri: src/
      Description: Sirve el frontend FTGO (HTML con CSS/JS inline)
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: GET
        AnyPath:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: GET

Outputs:
  FrontendUrl:
    Description: URL del frontend
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
