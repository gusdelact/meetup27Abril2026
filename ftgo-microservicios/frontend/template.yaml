AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  FTGO Frontend — Hosting con Lambda + API Gateway.
  Sirve los archivos estáticos (HTML/CSS/JS) a través de una
  función Lambda que actúa como servidor web simple.
  Alternativa a S3+CloudFront cuando no están disponibles.

Globals:
  Function:
    Timeout: 10
    Runtime: python3.13
    MemorySize: 128

Resources:

  FrontendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ftgo-frontend
      Handler: handler.lambda_handler
      CodeUri: src/
      Description: Sirve archivos estáticos del frontend FTGO
      Events:
        Root:
          Type: Api
          Properties:
            Path: /
            Method: GET
        StaticFile:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: GET
        OptionsRoot:
          Type: Api
          Properties:
            Path: /
            Method: OPTIONS
        OptionsProxy:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: OPTIONS

Outputs:
  FrontendUrl:
    Description: URL del frontend
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  FunctionArn:
    Description: ARN de la función Lambda del frontend
    Value: !GetAtt FrontendFunction.Arn
