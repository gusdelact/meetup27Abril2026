AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  FTGO Frontend — Hosting estático con S3 + CloudFront.
  El frontend (HTML/CSS/JS) se sirve desde un bucket S3
  y se distribuye globalmente con CloudFront (CDN).

Resources:

  # Bucket S3 donde se almacenan los archivos estáticos
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ftgo-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Política que permite a CloudFront leer del bucket
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # Control de acceso de origen (OAC) — CloudFront accede a S3 de forma segura
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: ftgo-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Distribución CloudFront (CDN)
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
          Compress: true

Outputs:
  BucketName:
    Description: Nombre del bucket S3 del frontend
    Value: !Ref FrontendBucket
  DistributionId:
    Description: ID de la distribución CloudFront
    Value: !Ref CloudFrontDistribution
  FrontendUrl:
    Description: URL del frontend (CloudFront)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
